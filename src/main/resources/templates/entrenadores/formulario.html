<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head><title>Entrenador – Formulario</title></head>
<body>
<main>
    <div class="card">
        <div class="card-header">
            <h1 th:text="${entrenador.id == null} ? '➕ Nuevo Entrenador' : '✏️ Editar Entrenador'"></h1>
            <a class="btn btn-secondary" th:href="@{/entrenadores}">← Volver</a>
        </div>

        <form th:action="@{/entrenadores/guardar}" th:object="${entrenador}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" th:field="*{apellido}" class="form-control"
                           th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></div>
                </div>
                <div class="form-group">
                    <label>Edad</label>
                    <input type="number" th:field="*{edad}" class="form-control" min="18" max="99"
                           th:classappend="${#fields.hasErrors('edad')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('edad')}" th:errors="*{edad}"></div>
                </div>
                <div class="form-group">
                    <label>Nacionalidad</label>
                    <input type="text" th:field="*{nacionalidad}" class="form-control"
                           th:classappend="${#fields.hasErrors('nacionalidad')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nacionalidad')}" th:errors="*{nacionalidad}"></div>
                </div>
            </div>

            <div style="display:flex;gap:1rem;margin-top:1.5rem">
                <button type="submit" class="btn btn-success">💾 Guardar</button>
                <a class="btn btn-secondary" th:href="@{/entrenadores}">Cancelar</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
