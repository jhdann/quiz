<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head><title>Entrenadores</title></head>
<body>
<main>
    <div class="card">
        <div class="card-header">
            <h1>🧑‍💼 Entrenadores <span class="relation-label">@OneToOne ← Club</span></h1>
            <a class="btn btn-primary" th:href="@{/entrenadores/nuevo}">+ Nuevo Entrenador</a>
        </div>

        <div th:if="${entrenadores.empty}" class="empty-state">
            <div class="icon">🧑‍💼</div>
            <p>No hay entrenadores registrados.</p>
        </div>

        <div th:unless="${entrenadores.empty}" class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th><th>Apellido</th>
                        <th>Edad</th><th>Nacionalidad</th><th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="e : ${entrenadores}">
                        
                        <td th:text="${e.nombre}"></td>
                        <td th:text="${e.apellido}"></td>
                        <td th:text="${e.edad}"></td>
                        <td th:text="${e.nacionalidad}"></td>
                        <td class="actions">
                            <a class="btn btn-warning" th:href="@{/entrenadores/editar/{id}(id=${e.id})}">✏️ Editar</a>
                            <a class="btn btn-danger"  th:href="@{/entrenadores/eliminar/{id}(id=${e.id})}"
                               onclick="return confirm('¿Eliminar este entrenador?')">🗑️ Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
