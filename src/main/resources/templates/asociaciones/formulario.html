<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head><title>Asociación – Formulario</title></head>
<body>
<main>
    <div class="card">
        <div class="card-header">
            <h1 th:text="${asociacion.id == null} ? '➕ Nueva Asociación' : '✏️ Editar Asociación'"></h1>
            <a class="btn btn-secondary" th:href="@{/asociaciones}">← Volver</a>
        </div>

        <form th:action="@{/asociaciones/guardar}" th:object="${asociacion}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" th:field="*{nombre}" class="form-control"
                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'" placeholder="Ej: FCF"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="form-group">
                <label>País</label>
                <input type="text" th:field="*{pais}" class="form-control"
                       th:classappend="${#fields.hasErrors('pais')} ? 'is-invalid'" placeholder="Ej: Colombia"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('pais')}" th:errors="*{pais}"></div>
            </div>

            <div class="form-group">
                <label>Presidente</label>
                <input type="text" th:field="*{presidente}" class="form-control"
                       th:classappend="${#fields.hasErrors('presidente')} ? 'is-invalid'" placeholder="Ej: Ramón Jesurún"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('presidente')}" th:errors="*{presidente}"></div>
            </div>

            <div style="display:flex;gap:1rem;margin-top:1.5rem">
                <button type="submit" class="btn btn-success">💾 Guardar</button>
                <a class="btn btn-secondary" th:href="@{/asociaciones}">Cancelar</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
