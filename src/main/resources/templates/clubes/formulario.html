<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head><title>Club - Formulario</title></head>
<body>
<main>
    <div class="card">
        <div class="card-header">
            <h1 th:text="${club.id == null} ? 'Nuevo Club' : 'Editar Club'"></h1>
            <a class="btn btn-secondary" th:href="@{/clubes}">Volver</a>
        </div>

        <form th:action="@{/clubes/guardar}" th:object="${club}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <p class="section-title">Datos del Club</p>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem">
                <div class="form-group">
                    <label>Nombre del Club</label>
                    <input type="text" th:field="*{nombre}" class="form-control"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                           placeholder="Ej: Millonarios FC"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>
                <div class="form-group">
                    <label>Ciudad</label>
                    <input type="text" th:field="*{ciudad}" class="form-control"
                           th:classappend="${#fields.hasErrors('ciudad')} ? 'is-invalid'"
                           placeholder="Ej: Bogota"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('ciudad')}" th:errors="*{ciudad}"></div>
                </div>
                <div class="form-group">
                    <label>Anio de Fundacion</label>
                    <input type="number" th:field="*{anioFundacion}" class="form-control"
                           min="1800" max="2100" placeholder="Ej: 1946"/>
                </div>
            </div>

            <p class="section-title">Asociacion - @ManyToOne</p>
            <div class="form-group">
                <label>Asociacion a la que pertenece el club</label>
                <select th:field="*{asociacion.id}" class="form-control">
                    <option value="">-- Sin asociacion --</option>
                    <option th:each="a : ${asociaciones}"
                            th:value="${a.id}"
                            th:text="${a.nombre + ' (' + a.pais + ')'}">
                    </option>
                </select>
            </div>

            <p class="section-title">Entrenador - @OneToOne</p>
            <div class="form-group">
                <label>Entrenador del club (solo disponibles)</label>
                <select th:field="*{entrenador.id}" class="form-control">
                    <option value="">-- Sin entrenador --</option>
                    <option th:each="e : ${entrenadores}"
                            th:value="${e.id}"
                            th:text="${e.nombre + ' ' + e.apellido + ' (' + e.nacionalidad + ')'}">
                    </option>
                </select>
                <small style="color:#718096" th:if="${entrenadores.empty}">
                    No hay entrenadores disponibles. Todos estan asignados a un club.
                </small>
            </div>

            <p class="section-title">Jugadores del Plantel - @OneToMany + @JoinColumn</p>
            <div class="form-group">
                <label>Selecciona los jugadores del club (Ctrl+Click para varios)</label>
                <select name="jugadorIds" multiple class="form-control">
                    <option th:each="j : ${jugadoresDisponibles}"
                            th:value="${j.id}"
                            th:text="${j.nombre + ' ' + j.apellido + ' - ' + j.posicion + ' (#' + j.numero + ')'}"
                            th:selected="${club.jugadores != null and #lists.contains(club.jugadores, j)}">
                    </option>
                </select>
                <small style="color:#718096">Si no seleccionas ninguno, el plantel quedara vacio.</small>
            </div>

            <p class="section-title">Competiciones - @ManyToMany</p>
            <div class="form-group">
                <label>Competiciones en las que participa (Ctrl+Click para varias)</label>
                <select name="competicionIds" multiple class="form-control">
                    <option th:each="comp : ${competicionesDisponibles}"
                            th:value="${comp.id}"
                            th:text="${comp.nombre}"
                            th:selected="${club.competiciones != null and #lists.contains(club.competiciones, comp)}">
                    </option>
                </select>
            </div>

            <div style="display:flex;gap:1rem;margin-top:1.5rem">
                <button type="submit" class="btn btn-success">Guardar Club</button>
                <a class="btn btn-secondary" th:href="@{/clubes}">Cancelar</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
