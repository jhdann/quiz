<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">Fútbol JPA</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">
        <span>⚽</span> Fútbol JPA
    </a>
    <div class="navbar-links">
        <a th:href="@{/asociaciones}">Asociaciones</a>
        <a th:href="@{/clubes}">Clubes</a>
        <a th:href="@{/entrenadores}">Entrenadores</a>
        <a th:href="@{/jugadores}">Jugadores</a>
        <a th:href="@{/competiciones}">Competiciones</a>  
    </div>
</nav>

<div class="container">
    <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>
    <div th:if="${error}"   class="alert alert-danger">❌ <span th:text="${error}"></span></div>
    <th:block th:replace="${content}"/>
</div>

</body>
</html>
