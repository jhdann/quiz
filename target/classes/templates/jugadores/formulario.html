<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head><title>Jugador – Formulario</title></head>
<body>
<main>
    <div class="card">
        <div class="card-header">
            <h1 th:text="${jugador.id == null} ? '➕ Nuevo Jugador' : '✏️ Editar Jugador'"></h1>
            <a class="btn btn-secondary" th:href="@{/jugadores}">← Volver</a>
        </div>

        <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" th:field="*{apellido}" class="form-control"
                           th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></div>
                </div>
                <div class="form-group">
                    <label>Número de camiseta</label>
                    <input type="number" th:field="*{numero}" class="form-control" min="1" max="99"
                           th:classappend="${#fields.hasErrors('numero')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('numero')}" th:errors="*{numero}"></div>
                </div>
                <div class="form-group">
                    <label>Posición</label>
                    <select th:field="*{posicion}" class="form-control"
                            th:classappend="${#fields.hasErrors('posicion')} ? 'is-invalid'">
                        <option value="">-- Seleccione --</option>
                        <option value="Portero">Portero</option>
                        <option value="Defensa">Defensa</option>
                        <option value="Centrocampista">Centrocampista</option>
                        <option value="Delantero">Delantero</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('posicion')}" th:errors="*{posicion}"></div>
                </div>
            </div>

            <div style="display:flex;gap:1rem;margin-top:1.5rem">
                <button type="submit" class="btn btn-success">💾 Guardar</button>
                <a class="btn btn-secondary" th:href="@{/jugadores}">Cancelar</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
