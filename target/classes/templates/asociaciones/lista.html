<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head><title>Asociaciones</title></head>
<body>
<main>
    <div class="card">
        <div class="card-header">
            <h1>🏛️ Asociaciones</h1>
            <a class="btn btn-primary" th:href="@{/asociaciones/nueva}">+ Nueva Asociación</a>
        </div>

        <div th:if="${asociaciones.empty}" class="empty-state">
            <div class="icon">🏛️</div>
            <p>No hay asociaciones registradas.</p>
        </div>

        <div th:unless="${asociaciones.empty}" class="table-responsive">
            <table>
                <thead>
                    <tr>
                        
                        <th>Nombre</th>
                        <th>País</th>
                        <th>Presidente</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${asociaciones}">
                        
                        <td th:text="${a.nombre}"></td>
                        <td th:text="${a.pais}"></td>
                        <td th:text="${a.presidente}"></td>
                        <td class="actions">
                            <a class="btn btn-warning" th:href="@{/asociaciones/editar/{id}(id=${a.id})}">✏️ Editar</a>
                            <a class="btn btn-danger"  th:href="@{/asociaciones/eliminar/{id}(id=${a.id})}"
                               onclick="return confirm('¿Eliminar esta asociación?')">🗑️ Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
